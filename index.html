<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Car Game 3D</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            overflow: hidden;
            background: linear-gradient(135deg, #1a2a6c, #b21f1f, #1a2a6c);
            height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
        }
        
        #gameContainer {
            position: relative;
            width: 100%;
            height: 100%;
        }
        
        #canvasContainer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            font-size: 18px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            pointer-events: none;
            background: rgba(0,0,0,0.5);
            padding: 15px;
            border-radius: 8px;
            line-height: 1.4;
            z-index: 10;
        }
        
        #controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.7);
            padding: 15px;
            border-radius: 8px;
            color: white;
            font-weight: bold;
            z-index: 10;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        
        #specialControls {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(0,0,0,0.7);
            padding: 15px;
            border-radius: 8px;
            color: white;
            font-weight: bold;
            z-index: 10;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        
        button {
            background: linear-gradient(45deg, #ff8a00, #e52e71);
            border: none;
            padding: 10px 15px;
            margin: 5px;
            border-radius: 5px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            display: block;
            width: 100%;
            margin-bottom: 10px;
        }
        
        button:hover {
            background: linear-gradient(45deg, #ff9a3d, #ec407a);
        }
        
        .highlight {
            color: #ff8a00;
        }
        
        #mobileControls {
            display: none;
            position: absolute;
            bottom: 30px;
            left: 0;
            width: 100%;
            height: 160px;
            z-index: 30;
            pointer-events: none;
        }
        
        #joystickZone {
            position: absolute;
            left: 40px;
            bottom: 20px;
            width: 130px;
            height: 130px;
            background: rgba(255,255,255,0.15);
            border: 3px solid rgba(255,255,255,0.4);
            border-radius: 50%;
            pointer-events: auto;
        }
        
        #joystickStick {
            position: absolute;
            left: 40px;
            top: 40px;
            width: 50px;
            height: 50px;
            background: rgba(255, 138, 0, 0.8);
            border-radius: 50%;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
            transition: transform 0.05s linear;
        }
        
        #pedalsZone {
            position: absolute;
            right: 40px;
            bottom: 20px;
            width: 180px;
            height: 130px;
            pointer-events: auto;
            display: flex;
            gap: 20px;
        }
        
        .pedal {
            flex: 1;
            height: 100%;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 20px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.4);
            text-transform: uppercase;
        }
        
        #brakePedal {
            background: rgba(220, 20, 60, 0.6);
            border: 2px solid #dc143c;
        }
        
        #brakePedal:active {
            background: rgba(220, 20, 60, 0.9);
        }
        
        #gasPedal {
            background: rgba(46, 139, 87, 0.6);
            border: 2px solid #2e8b57;
        }
        
        #gasPedal:active {
            background: rgba(46, 139, 87, 0.9);
        }
        
        #camBtnMobile {
            position: absolute;
            top: 20px;
            right: 260px;
            background: rgba(0,0,0,0.6);
            border: 1px solid white;
            color: white;
            padding: 10px 15px;
            border-radius: 6px;
            font-weight: bold;
            z-index: 30;
            display: none;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <div id="canvasContainer"></div>
        
        <div id="ui">
            Kamera: <span id="camMode" class="highlight">TPP</span><br>
            Prędkość: <span id="speed">0</span> km/h<br>
            Kierunek: <span id="direction">0</span>°
        </div>
        
        <div id="controls">
            <div>Sterowanie: Strzałki / WASD</div>
            <div>Kamera: C | Reset: R</div>
        </div>
        
        <div id="specialControls">
            <button id="flipCarBtn">Odwróć auto</button>
            <button id="rotate180Btn">Obróć 180°</button>
            <button id="resetPositionBtn">Reset pozycji</button>
        </div>
        
        <div id="mobileControls">
            <div id="joystickZone">
                <div id="joystickStick"></div>
            </div>
            <div id="pedalsZone">
                <div id="brakePedal" class="pedal">Hamulec</div>
                <div id="gasPedal" class="pedal">Gaz</div>
            </div>
        </div>
        
        <button id="camBtnMobile">KAMERA (C)</button>
    </div>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // Global variables
        let scene, camera, renderer, car;
        let keys = {};
        let mobileGas = false;
        let mobileBrake = false;
        let mobileSteerX = 0;
        let speed = 0;
        let carRotation = Math.PI; // Ustawiamy początkowy obrót o 180°
        let steerInput = 0;
        const friction = 0.0015;
        let cameraMode = 'tpp';
        
        // Initialize the game
        function init() {
            // Create scene
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB);
            scene.fog = new THREE.FogExp2(0x87CEEB, 0.008);
            
            // Create camera
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1500);
            camera.position.set(0, 5, 10);
            
            // Create renderer
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            document.getElementById('canvasContainer').appendChild(renderer.domElement);
            
            // Add lights
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
            scene.add(ambientLight);
            
            const dirLight = new THREE.DirectionalLight(0xffffff, 0.9);
            dirLight.position.set(40, 100, 20);
            dirLight.castShadow = true;
            scene.add(dirLight);
            
            // Create ground
            const groundGeometry = new THREE.PlaneGeometry(1000, 1000);
            const groundMaterial = new THREE.MeshStandardMaterial({ color: 0x2E8B57 });
            const ground = new THREE.Mesh(groundGeometry, groundMaterial);
            ground.rotation.x = -Math.PI / 2;
            ground.receiveShadow = true;
            scene.add(ground);
            
            // Create road
            const roadGeometry = new THREE.PlaneGeometry(15, 1000);
            const roadMaterial = new THREE.MeshStandardMaterial({ color: 0x333333 });
            const road = new THREE.Mesh(roadGeometry, roadMaterial);
            road.rotation.x = -Math.PI / 2;
            road.position.y = 0.01;
            road.receiveShadow = true;
            scene.add(road);
            
            // Create car
            const carGeometry = new THREE.BoxGeometry(2, 1, 4);
            const carMaterial = new THREE.MeshPhongMaterial({ color: 0x0066cc });
            car = new THREE.Mesh(carGeometry, carMaterial);
            car.position.y = 0.5;
            car.rotation.y = carRotation; // Ustawiamy początkowy obrót
            car.castShadow = true;
            scene.add(car);
            
            // Add wheels
            const wheelGeometry = new THREE.CylinderGeometry(0.5, 0.5, 0.2, 16);
            wheelGeometry.rotateZ(Math.PI / 2);
            const wheelMaterial = new THREE.MeshPhongMaterial({ color: 0x333333 });
            
            const frontLeftWheel = new THREE.Mesh(wheelGeometry, wheelMaterial);
            frontLeftWheel.position.set(1, 0.5, 1.5);
            scene.add(frontLeftWheel);
            
            const frontRightWheel = new THREE.Mesh(wheelGeometry, wheelMaterial);
            frontRightWheel.position.set(-1, 0.5, 1.5);
            scene.add(frontRightWheel);
            
            const rearLeftWheel = new THREE.Mesh(wheelGeometry, wheelMaterial);
            rearLeftWheel.position.set(1, 0.5, -1.5);
            scene.add(rearLeftWheel);
            
            const rearRightWheel = new THREE.Mesh(wheelGeometry, wheelMaterial);
            rearRightWheel.position.set(-1, 0.5, -1.5);
            scene.add(rearRightWheel);
            
            // Add trees
            for (let i = 0; i < 50; i++) {
                const treeTrunkGeometry = new THREE.CylinderGeometry(0.2, 0.2, 2, 8);
                const treeTrunkMaterial = new THREE.MeshPhongMaterial({ color: 0x8B4513 });
                const treeTrunk = new THREE.Mesh(treeTrunkGeometry, treeTrunkMaterial);
                treeTrunk.position.set(
                    Math.random() * 100 - 50,
                    1,
                    Math.random() * 1000 - 500
                );
                treeTrunk.castShadow = true;
                scene.add(treeTrunk);
                
                const treeLeavesGeometry = new THREE.SphereGeometry(1.5, 8, 8);
                const treeLeavesMaterial = new THREE.MeshPhongMaterial({ color: 0x228B22 });
                const treeLeaves = new THREE.Mesh(treeLeavesGeometry, treeLeavesMaterial);
                treeLeaves.position.set(
                    treeTrunk.position.x,
                    treeTrunk.position.y + 2,
                    treeTrunk.position.z
                );
                treeLeaves.castShadow = true;
                scene.add(treeLeaves);
            }
            
            // Setup event listeners
            setupEventListeners();
            
            // Handle window resize
            window.addEventListener('resize', onWindowResize);
            
            // Start animation loop
            animate();
        }
        
        function setupEventListeners() {
            // Keyboard events
            window.addEventListener('keydown', (e) => {
                keys[e.key.toLowerCase()] = true;
                
                // Camera toggle
                if (e.key.toLowerCase() === 'c') {
                    toggleCamera();
                }
                
                // Reset position
                if (e.key.toLowerCase() === 'r') {
                    resetCarPosition();
                }
            });
            
            window.addEventListener('keyup', (e) => {
                keys[e.key.toLowerCase()] = false;
            });
            
            // Special controls buttons
            document.getElementById('flipCarBtn').addEventListener('click', flipCar);
            document.getElementById('rotate180Btn').addEventListener('click', rotate180);
            document.getElementById('resetPositionBtn').addEventListener('click', resetCarPosition);
            
            // Mobile controls
            const isMobile = /Android|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
            if (isMobile) {
                document.getElementById('mobileControls').style.display = 'block';
                document.getElementById('camBtnMobile').style.display = 'block';
                
                // Gas pedal
                const gasPedal = document.getElementById('gasPedal');
                gasPedal.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    mobileGas = true;
                });
                gasPedal.addEventListener('touchend', (e) => {
                    e.preventDefault();
                    mobileGas = false;
                });
                
                // Brake pedal
                const brakePedal = document.getElementById('brakePedal');
                brakePedal.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    mobileBrake = true;
                });
                brakePedal.addEventListener('touchend', (e) => {
                    e.preventDefault();
                    mobileBrake = false;
                });
                
                // Camera button
                document.getElementById('camBtnMobile').addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    toggleCamera();
                });
                
                // Joystick
                const joyZone = document.getElementById('joystickZone');
                const joyStick = document.getElementById('joystickStick');
                const joyRadius = 65;
                
                function handleJoystick(e) {
                    e.preventDefault();
                    const touch = e.touches[0];
                    const rect = joyZone.getBoundingClientRect();
                    const centerX = rect.left + rect.width / 2;
                    
                    let deltaX = touch.clientX - centerX;
                    deltaX = Math.max(-joyRadius, Math.min(joyRadius, deltaX));
                    
                    joyStick.style.transform = `translateX(${deltaX}px)`;
                    mobileSteerX = -deltaX / joyRadius;
                }
                
                joyZone.addEventListener('touchstart', handleJoystick);
                joyZone.addEventListener('touchmove', handleJoystick);
                joyZone.addEventListener('touchend', (e) => {
                    e.preventDefault();
                    joyStick.style.transform = `translateX(0px)`;
                    mobileSteerX = 0;
                });
            }
        }
        
        function toggleCamera() {
            cameraMode = cameraMode === 'tpp' ? 'fpp' : 'tpp';
            document.getElementById('camMode').innerText = cameraMode.toUpperCase();
        }
        
        function flipCar() {
            // Odwracamy auto w osi X
            car.rotation.x = car.rotation.x === 0 ? Math.PI : 0;
        }
        
        function rotate180() {
            // Obracamy auto o 180 stopni
            carRotation += Math.PI;
            car.rotation.y = carRotation;
        }
        
        function resetCarPosition() {
            car.position.set(0, 0.5, 0);
            carRotation = Math.PI; // Ustawiamy obrót zgodnie z kierunkiem jazdy
            car.rotation.set(0, carRotation, 0);
            speed = 0;
        }
        
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
        
        function updateUI() {
            document.getElementById('speed').innerText = Math.abs(Math.round(speed * 100));
            document.getElementById('direction').innerText = Math.round(carRotation * 180 / Math.PI) % 360;
            document.getElementById('posX').innerText = car.position.x.toFixed(1);
            document.getElementById('posZ').innerText = car.position.z.toFixed(1);
        }
        
        function animate() {
            requestAnimationFrame(animate);
            
            // Handle input
            let isAccelerating = keys['w'] || keys['arrowup'] || mobileGas;
            let isBraking = keys['s'] || keys['arrowdown'] || mobileBrake;
            
            // Update speed
            if (isAccelerating) {
                speed = Math.min(speed + 0.005, 0.5);
            } else if (isBraking) {
                speed = Math.max(speed - 0.01, -0.3);
            } else {
                if (speed > 0) {
                    speed = Math.max(0, speed - friction);
                } else if (speed < 0) {
                    speed = Math.min(0, speed + friction);
                }
            }
            
            // Handle steering
            let targetSteer = 0;
            if (isMobile) {
                targetSteer = mobileSteerX;
            } else {
                if (keys['a'] || keys['arrowleft']) targetSteer = 1;
                if (keys['d'] || keys['arrowright']) targetSteer = -1;
            }
            
            // Apply steering
            if (targetSteer !== 0) {
                steerInput = THREE.MathUtils.clamp(steerInput + targetSteer * 0.07, -1, 1);
            } else {
                steerInput *= 0.80;
                if (Math.abs(steerInput) < 0.01) steerInput = 0;
            }
            
            // Apply steering to rotation
            let absSpeed = Math.abs(speed);
            if (absSpeed > 0.005) {
                let speedSensitivity = 1.0 / (1.0 + absSpeed * 5.0);
                let turnAmount = steerInput * 0.040 * speedSensitivity * speed;
                carRotation += turnAmount * (speed > 0 ? 1 : -1);
            }
            
            // Update car position and rotation
            car.position.x += Math.sin(carRotation) * speed;
            car.position.z += Math.cos(carRotation) * speed;
            car.rotation.y = carRotation;
            
            // Update camera
            if (cameraMode === 'tpp') {
                camera.position.x = car.position.x - Math.sin(carRotation) * 12;
                camera.position.z = car.position.z - Math.cos(carRotation) * 12;
                camera.position.y = car.position.y + 4.0;
                camera.lookAt(car.position.x, car.position.y + 1.2, car.position.z);
            } else {
                // FPP camera
                camera.position.x = car.position.x + Math.sin(carRotation) * 0.5;
                camera.position.y = car.position.y + 1.8;
                camera.position.z = car.position.z + Math.cos(carRotation) * 0.5;
                camera.lookAt(
                    car.position.x + Math.sin(carRotation) * 20,
                    car.position.y + 1.5,
                    car.position.z + Math.cos(carRotation) * 20
                );
            }
            
            // Update UI
            updateUI();
            
            // Render scene
            renderer.render(scene, camera);
        }
        
        // Start the game when page loads
        window.onload = init;
    </script>
</body>
</html>
