<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>RACE MASTER 3D - MULTIPLAYER</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; }
        #menu { position: absolute; width: 100%; height: 100%; background: #000; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; }
        #hud { position: absolute; bottom: 20px; left: 20px; display: none; background: rgba(0,0,0,0.6); padding: 15px; }
        input { padding: 10px; margin: 5px; }
        button { padding: 10px 20px; cursor: pointer; }
    </style>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
</head>
<body>

<div id="menu">
    <h1>RACE MASTER 3D</h1>
    <input id="myId" readonly placeholder="Twoje ID...">
    <button onclick="Game.startHost()">HOSTUJ GRĘ</button>
    <input id="peerId" placeholder="Wpisz ID hosta...">
    <button onclick="Game.startJoin()">DOŁĄCZ</button>
</div>

<div id="hud">
    <div id="speed">0 km/h</div>
    <div id="gear">Bieg: 1</div>
</div>

<script type="importmap">
    { "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }}
</script>

<script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { DRACOLoader } from 'three/addons/loaders/DRACOLoader.js';

    window.Game = {
        peer: new Peer(),
        conn: null,
        scene: new THREE.Scene(),
        car: null,
        speed: 0, gear: 1,
        
        init() {
            this.renderer = new THREE.WebGLRenderer({ antialias: true });
            this.renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(this.renderer.domElement);
            this.camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 20000);
            this.scene.add(new THREE.AmbientLight(0xffffff, 1.5));
            
            const draco = new DRACOLoader().setDecoderPath('https://www.gstatic.com/draco/v1/decoders/');
            this.loader = new GLTFLoader().setDRACOLoader(draco);
            
            this.loader.load('./mapa1.glb', (gltf) => { gltf.scene.scale.set(10,10,10); this.scene.add(gltf.scene); });
            this.loader.load('./bmw_m4.glb', (gltf) => { this.car = gltf.scene; this.scene.add(this.car); });
            
            this.peer.on('open', (id) => document.getElementById('myId').value = id);
            this.peer.on('connection', (c) => this.conn = c);
            this.animate();
        },

        startHost() { document.getElementById('menu').style.display = 'none'; document.getElementById('hud').style.display = 'block'; this.init(); },
        startJoin() { 
            this.conn = this.peer.connect(document.getElementById('peerId').value);
            this.startHost();
        },

        animate() {
            requestAnimationFrame(() => this.animate());
            if(this.car) {
                // ... (Twoja logika sterowania)
                if(this.conn && this.conn.open) {
                    this.conn.send({ p: this.car.position, r: this.car.rotation });
                }
            }
            this.renderer.render(this.scene, this.camera);
        }
    };
</script>
</body>
</html>
