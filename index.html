<!DOCTYPE html>
<html>
<head>
    <title>RACE MASTER 3D</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { margin: 0; background: #050505; color: #fff; overflow: hidden; font-family: 'Arial', sans-serif; }
        #m { position: absolute; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9; background: rgba(0,0,0,0.85); }
        h1 { font-size: 3rem; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 5px; color: #00d4ff; }
        button { padding: 15px 40px; font-size: 1.2rem; cursor: pointer; background: #00d4ff; border: none; border-radius: 5px; font-weight: bold; transition: 0.3s; }
        button:hover { background: #fff; transform: scale(1.1); }
        .controls { margin-top: 20px; color: #888; font-size: 0.9rem; }
    </style>
</head>
<body>
<div id="m">
    <h1>RACE MASTER 3D</h1>
    <button id="s">START WYŚCIGU</button>
    <div class="controls">W-A-S-D: Jazda | V: Kamera | Shift/Ctrl: Bieg</div>
</div>

<script type="importmap">
  { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
</script>

<script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { DRACOLoader } from 'three/addons/loaders/DRACOLoader.js';

    let s=new THREE.Scene(), c=new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,20000), r=new THREE.WebGLRenderer({antialias:true}), car, vel=0, gear=1, view=0, k={}, peer=new Peer(), conn;
    r.setSize(innerWidth, innerHeight); document.body.appendChild(r.domElement);
    s.add(new THREE.AmbientLight(0xffffff, 2));

    document.getElementById('s').onclick = () => {
        document.getElementById('m').style.display='none';
        const d=new DRACOLoader().setDecoderPath('https://www.gstatic.com/draco/v1/decoders/'), l=new GLTFLoader().setDRACOLoader(d);
        
        l.load('./mapa1.glb', (g) => { g.scene.scale.set(10,10,10); s.add(g.scene); });
        l.load('./bmw_m4.glb', (g) => { 
            car=g.scene; 
            // Zmniejszenie auta 100x
            car.scale.set(0.01, 0.01, 0.01); 
            s.add(car); 
        });
        animate();
    };

    window.onkeydown=(e)=>{k[e.key.toLowerCase()]=true; if(e.key=='v') view=!view; if(e.key=='Shift') gear=Math.min(gear+1,6); if(e.key=='Control') gear=Math.max(gear-1,1);};
    window.onkeyup=(e)=>k[e.key.toLowerCase()]=false;

    function animate(){
        requestAnimationFrame(animate);
        if(car){
            if(k['w']) vel+=0.0015*gear; else if(k['s']) vel-=0.002; else vel*=0.98;
            if(k['a']) car.rotation.y+=0.04; if(k['d']) car.rotation.y-=0.04;
            car.position.x+=Math.sin(car.rotation.y)*vel; car.position.z+=Math.cos(car.rotation.y)*vel;
            
            // Logika kamery dostosowana do mniejszego obiektu
            let o=view?new THREE.Vector3(0,0.04,0.12):new THREE.Vector3(0,0.007,0.004); 
            o.applyAxisAngle(new THREE.Vector3(0,1,0), car.rotation.y);
            c.position.lerp(car.position.clone().add(o), 0.1); 
            c.lookAt(car.position);

            // Przykład wysyłania pozycji przez Multiplayer (jeśli połączony)
            if(conn && conn.open) conn.send({p: car.position, r: car.rotation});
        }
        r.render(s,c);
    }
</script>
</body>
</html>
