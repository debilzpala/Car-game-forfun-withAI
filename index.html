<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>RACE MASTER 3D</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { margin: 0; background: #111; color: #fff; font-family: sans-serif; overflow: hidden; }
        #menu { position: absolute; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: #000; z-index: 10; }
        .hidden { display: none !important; }
        button { padding: 15px 30px; margin: 10px; cursor: pointer; font-size: 1.2rem; }
        #ui { position: absolute; top: 20px; left: 20px; pointer-events: none; font-size: 24px; color: #0f0; }
    </style>
</head>
<body>

<div id="menu">
    <div id="main-menu">
        <h1>RACE MASTER 3D</h1>
        <button onclick="show('mode-select')">START</button>
    </div>
    <div id="mode-select" class="hidden">
        <button onclick="initGame(false)">SINGLE PLAYER</button>
        <button onclick="show('p2p-menu')">MULTIPLAYER</button>
    </div>
    <div id="p2p-menu" class="hidden">
        <button onclick="initGame(true)">STWÓRZ LOBBY</button><br>
        <input id="peer-id" placeholder="ID hosta">
        <button onclick="joinGame()">DOŁĄCZ</button>
    </div>
    <div id="car-select" class="hidden">
        <button onclick="selectCar('bmw_m5.glb', 270, 0.00004)">BMW M5 (Stabilne)</button>
        <button onclick="selectCar('porshe.glb', 330, 0.00009)">PORSHE (Szybkie)</button>
    </div>
</div>

<div id="ui" class="hidden"><div id="hud">Prędkość: 0 km/h</div></div>

<script type="importmap">{ "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }</script>

<script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { DRACOLoader } from 'three/addons/loaders/DRACOLoader.js';

    let s = new THREE.Scene(), c = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.001, 1000), r = new THREE.WebGLRenderer({antialias: true});
    document.body.appendChild(r.domElement); r.setSize(innerWidth, innerHeight);
    s.add(new THREE.AmbientLight(0xffffff, 2));
    s.add(new THREE.DirectionalLight(0xffffff, 1));

    let car, peer = new Peer(), conn, carData, vel = 0, k = {};
    const loader = new GLTFLoader().setDRACOLoader(new DRACOLoader().setDecoderPath('https://www.gstatic.com/draco/v1/decoders/'));

    window.show = (id) => {
        document.querySelectorAll('#menu > div').forEach(d => d.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
    };

    window.initGame = (multi) => { show('car-select'); };

    window.selectCar = (model, max, acc) => {
        carData = {max, acc};
        document.getElementById('menu').classList.add('hidden');
        document.getElementById('ui').classList.remove('hidden');
        
        loader.load(model, (g) => { 
            car = g.scene; 
            car.scale.set(0.01, 0.01, 0.01); 
            car.position.y = 0.01; // Lekkie uniesienie auta nad asfalt
            s.add(car); 
        });
        loader.load('mapa1.glb', (g) => { g.scene.scale.set(10, 10, 10); s.add(g.scene); });
        animate();
    };

    window.joinGame = () => { conn = peer.connect(document.getElementById('peer-id').value); initGame(true); };
    peer.on('connection', (c) => conn = c);

    window.onkeydown = (e) => k[e.key.toLowerCase()] = true;
    window.onkeyup = (e) => k[e.key.toLowerCase()] = false;

    function animate() {
        requestAnimationFrame(animate);
        if(car) {
            if(k['w']) vel = Math.min(vel + carData.acc, carData.max / 5000);
            else vel *= 0.99;
            car.rotation.y += (k['a'] ? 0.02 : 0) - (k['d'] ? 0.02 : 0);
            car.position.x += Math.sin(car.rotation.y) * vel;
            car.position.z += Math.cos(car.rotation.y) * vel;

            // Kamera sztywno za autem (skala 0.01 wymaga małych wartości)
            let camOffset = new THREE.Vector3(0, 0.03, -0.08).applyAxisAngle(new THREE.Vector3(0,1,0), car.rotation.y);
            c.position.copy(car.position).add(camOffset);
            c.lookAt(car.position.clone().add(new THREE.Vector3(0, 0, 0.05).applyAxisAngle(new THREE.Vector3(0,1,0), car.rotation.y)));

            if(conn && conn.open) conn.send({p: car.position, r: car.rotation});
            document.getElementById('hud').innerText = `Prędkość: ${Math.floor(vel * 5000)} km/h`;
        }
        r.render(s, c);
    }
</script>
</body>
</html>
