<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Race Master 3D - Naprawione Proporcje</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        #menu { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; }
        button { padding: 20px 40px; font-size: 20px; cursor: pointer; }
        #ui { position: absolute; top: 20px; left: 20px; color: white; font-family: sans-serif; display: none; }
    </style>
    <script type="importmap">
        { "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }}
    </script>
</head>
<body>
    <div id="menu">
        <h1>RACE MASTER 3D</h1>
        <button onclick="startGame()">START GRY</button>
    </div>
    <div id="ui">Prędkość: <span id="speed">0</span> km/h</div>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        let scene, camera, renderer, car, speed = 0;
        const keys = { w: false, s: false, a: false, d: false };

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB);
            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);
            scene.add(new THREE.AmbientLight(0xffffff, 1.0));

            const loader = new GLTFLoader();
            loader.load('./mapa1.glb', (gltf) => { scene.add(gltf.scene); });
            loader.load('./bmw_m4.glb', (gltf) => {
                car = gltf.scene;
                car.scale.set(0.05, 0.05, 0.05); // AUTO ZMNIEJSZONE 20 RAZY
                scene.add(car);
            });

            window.onkeydown = (e) => keys[e.key.toLowerCase()] = true;
            window.onkeyup = (e) => keys[e.key.toLowerCase()] = false;
        }

        window.startGame = () => {
            document.getElementById('menu').style.display = 'none';
            document.getElementById('ui').style.display = 'block';
            init();
            animate();
        };

        function animate() {
            requestAnimationFrame(animate);
            if (car) {
                if (keys.w) speed = 0.05;
                else if (keys.s) speed = -0.05;
                else speed *= 0.95;
                if (keys.a) car.rotation.y += 0.05;
                if (keys.d) car.rotation.y -= 0.05;
                car.position.x += Math.sin(car.rotation.y) * speed;
                car.position.z += Math.cos(car.rotation.y) * speed;
                
                // KAMERA BLISKO AUTA
                camera.position.set(
                    car.position.x - Math.sin(car.rotation.y) * 3,
                    car.position.y + 1.5,
                    car.position.z - Math.cos(car.rotation.y) * 3
                );
                camera.lookAt(car.position);
                document.getElementById('speed').innerText = Math.round(Math.abs(speed) * 1000);
            }
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
