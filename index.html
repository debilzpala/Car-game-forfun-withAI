<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gra 3D - Realistyczna Fizyka i Droga</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            overflow: hidden;
            background: linear-gradient(135deg, #1a2a6c, #b21f1f, #1a2a6c);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }
        
        #gameContainer {
            position: relative;
            width: 100%;
            height: 100%;
        }
        
        #canvasContainer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
        }
        
        canvas {
            display: block;
        }
        
        /* MENU STYLES */
        .menu {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.85);
            z-index: 100;
            padding: 20px;
            text-align: center;
        }
        
        .menu h1 {
            font-size: 3.5rem;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 3px;
            background: linear-gradient(to right, #ff8a00, #e52e71);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 10px rgba(255, 138, 0, 0.5);
        }
        
        .menu h2 {
            font-size: 2.5rem;
            margin: 20px 0;
            color: #ff8a00;
        }
        
        .menu button {
            background: linear-gradient(45deg, #ff8a00, #e52e71);
            border: none;
            padding: 15px 40px;
            margin: 15px 0;
            font-size: 1.4rem;
            color: white;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
            width: 300px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: bold;
        }
        
        .menu button:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4);
            background: linear-gradient(45deg, #ff9a3d, #ec407a);
        }
        
        .menu input {
            padding: 15px;
            width: 300px;
            margin: 15px 0;
            font-size: 1.2rem;
            border: 2px solid #ff8a00;
            border-radius: 50px;
            background: rgba(0, 0, 0, 0.5);
            color: white;
            text-align: center;
        }
        
        .menu input::placeholder {
            color: #aaa;
        }
        
        .backButton {
            background: rgba(255, 255, 255, 0.1) !important;
            border: 1px solid #ff8a00 !important;
            margin-top: 30px;
        }
        
        /* CAR SELECTOR */
        .carSelector {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            margin: 20px 0;
            max-width: 800px;
        }
        
        .carOption {
            width: 200px;
            height: 150px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 2px solid transparent;
            overflow: hidden;
        }
        
        .carOption:hover {
            transform: scale(1.05);
            border-color: #ff8a00;
            box-shadow: 0 0 20px rgba(255, 138, 0, 0.5);
        }
        
        .carOption.selected {
            border-color: #e52e71;
            background: rgba(229, 46, 113, 0.2);
            box-shadow: 0 0 20px rgba(229, 46, 113, 0.5);
        }
        
        .carImage {
            width: 100%;
            height: 100px;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
        }
        
        .carName {
            margin-top: 10px;
            font-size: 1.1rem;
            font-weight: bold;
        }
        
        /* MAP SELECTOR */
        .mapSelector {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            margin: 20px 0;
            max-width: 800px;
        }
        
        .mapOption {
            width: 200px;
            height: 150px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 2px solid transparent;
            overflow: hidden;
        }
        
        .mapOption:hover {
            transform: scale(1.05);
            border-color: #ff8a00;
            box-shadow: 0 0 20px rgba(255, 138, 0, 0.5);
        }
        
        .mapOption.selected {
            border-color: #e52e71;
            background: rgba(229, 46, 113, 0.2);
            box-shadow: 0 0 20px rgba(229, 46, 113, 0.5);
        }
        
        .mapImage {
            width: 100%;
            height: 100px;
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center;
        }
        
        .mapName {
            margin-top: 10px;
            font-size: 1.1rem;
            font-weight: bold;
        }
        
        /* LOADING SCREEN */
        #loadingScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 200;
            display: none;
        }
        
        .loader {
            width: 80px;
            height: 80px;
            border: 8px solid rgba(255, 255, 255, 0.1);
            border-top: 8px solid #ff8a00;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 30px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        #loadingText {
            font-size: 1.5rem;
            text-align: center;
            max-width: 80%;
        }
        
        /* GAME UI */
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            font-size: 18px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            pointer-events: none;
            background: rgba(0,0,0,0.5);
            padding: 15px;
            border-radius: 8px;
            line-height: 1.4;
            z-index: 10;
        }
        
        #instrukcja {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            background: rgba(0,0,0,0.6);
            padding: 10px 20px;
            border-radius: 10px;
            pointer-events: none;
            text-align: center;
            font-size: 14px;
            z-index: 10;
        }
        
        .highlight {
            color: #ff8a00;
        }
        
        /* MOBILE CONTROLS */
        #mobileControls {
            display: none;
            position: absolute;
            bottom: 30px;
            left: 0;
            width: 100%;
            height: 160px;
            z-index: 30;
            pointer-events: none;
        }
        
        #joystickZone {
            position: absolute;
            left: 40px;
            bottom: 20px;
            width: 130px;
            height: 130px;
            background: rgba(255,255,255,0.15);
            border: 3px solid rgba(255,255,255,0.4);
            border-radius: 50%;
            pointer-events: auto;
        }

            left: 40px;
            top: 40
