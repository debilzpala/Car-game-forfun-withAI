<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CyberCore Fixed</title>

<style>

body,html{
    margin:0;
    overflow:hidden;
    background:#050b14;
    font-family:Arial;
}

canvas{
    display:block;
}

.menu{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    background:#08131f;
    border:2px solid cyan;
    padding:30px;
    border-radius:15px;
    width:400px;
    color:white;
    z-index:10;
}

button{
    width:100%;
    padding:15px;
    margin-top:10px;
    background:#00ffff20;
    border:2px solid cyan;
    color:white;
    cursor:pointer;
    font-size:18px;
}

button:hover{
    background:cyan;
    color:black;
}

.car{
    border:2px solid #333;
    padding:15px;
    margin-top:10px;
    cursor:pointer;
}

.active{
    border-color:orange;
}

#hud{
    position:absolute;
    top:20px;
    left:20px;
    color:white;
    background:#00000099;
    padding:15px;
    border-radius:10px;
    display:none;
    z-index:5;
}

#speed{
    font-size:60px;
}

</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

</head>

<body>

<div class="menu" id="modeMenu">

<h1>TRYB</h1>

<button onclick="selectMode('singleplayer')">
SINGLEPLAYER
</button>

<button onclick="selectMode('multiplayer')">
MULTIPLAYER
</button>

</div>

<div class="menu" id="garageMenu" style="display:none;">

<h1>WYBIERZ AUTO</h1>

<div id="cars"></div>

<button onclick="startGame()">
START
</button>

</div>

<div id="hud">

<div id="carName">BMW</div>

<div id="speed">0</div>

<div>KM/H</div>

<div id="gear">GEAR 1</div>

</div>

<script>

let scene;
let camera;
let renderer;
let loader;

let carModel;

const Game = {

    selected:0,

    keys:{},

    mode:"singleplayer",

    cars:[

        {
            name:"BMW M4",
            file:"bmw_m5.glb",
            maxSpeed:280,
            acceleration:0.08,
            scale:1
        },

        {
            name:"Porsche 911",
            file:"porsche.glb",
            maxSpeed:320,
            acceleration:0.1,
            scale:1
        },

        {
            name:"Kamikaze K1",
            file:"kamikaze.glb",
            maxSpeed:56,
            acceleration:0.04,
            scale:1
        }

    ],

    physics:{
        speed:0,
        steering:0,
        heading:0,
        x:0,
        z:0,
        throttle:0
    }

};

function selectMode(mode){

    Game.mode = mode;

    document.getElementById("modeMenu").style.display = "none";

    document.getElementById("garageMenu").style.display = "block";

    buildGarage();
}

function buildGarage(){

    const cars = document.getElementById("cars");

    cars.innerHTML = "";

    Game.cars.forEach((car,index)=>{

        const div = document.createElement("div");

        div.className = "car";

        if(index===0){
            div.classList.add("active");
        }

        div.innerHTML = `
        <h2>${car.name}</h2>
        <div>MAX ${car.maxSpeed} KM/H</div>
        `;

        div.onclick = ()=>{

            Game.selected = index;

            document.querySelectorAll(".car")
            .forEach(el=>el.classList.remove("active"));

            div.classList.add("active");
        };

        cars.appendChild(div);

    });

}

function startGame(){

    document.getElementById("garageMenu")
    .style.display = "none";

    document.getElementById("hud")
    .style.display = "block";

    init3D();

}

function init3D(){

    scene = new THREE.Scene();

    scene.background = new THREE.Color(0x050b14);

    camera = new THREE.PerspectiveCamera(
        75,
        window.innerWidth/window.innerHeight,
        0.1,
        1000
    );

    renderer = new THREE.WebGLRenderer({
        antialias:true
    });

    renderer.setSize(
        window.innerWidth,
        window.innerHeight
    );

    document.body.appendChild(renderer.domElement);

    loader = new THREE.GLTFLoader();

    const light = new THREE.DirectionalLight(0xffffff,1);

    light.position.set(10,20,10);

    scene.add(light);

    scene.add(new THREE.AmbientLight(0x404040));

    const floor = new THREE.Mesh(

        new THREE.PlaneGeometry(2000,2000),

        new THREE.MeshStandardMaterial({
            color:0x111111
        })

    );

    floor.rotation.x = -Math.PI/2;

    scene.add(floor);

    loadCar();

    window.addEventListener("resize",resize);

    animate();
}

function loadCar(){

    const selected = Game.cars[Game.selected];

    loader.load(

        "./" + selected.file,

        (gltf)=>{

            carModel = gltf.scene;

            carModel.scale.set(
                selected.scale,
                selected.scale,
                selected.scale
            );

            scene.add(carModel);

            document.getElementById("carName")
            .innerText = selected.name;

        },

        undefined,

        (err)=>{

            console.log(err);

            alert(
                "Nie znaleziono pliku: "
                + selected.file
            );

        }

    );

}

function resize(){

    camera.aspect =
        window.innerWidth/window.innerHeight;

    camera.updateProjectionMatrix();

    renderer.setSize(
        window.innerWidth,
        window.innerHeight
    );

}

function physics(){

    const p = Game.physics;

    const car = Game.cars[Game.selected];

    const gas =
        Game.keys["KeyW"] ||
        Game.keys["ArrowUp"];

    const brake =
        Game.keys["KeyS"] ||
        Game.keys["ArrowDown"];

    const left =
        Game.keys["KeyA"] ||
        Game.keys["ArrowLeft"];

    const right =
        Game.keys["KeyD"] ||
        Game.keys["ArrowRight"];

    if(gas){

        p.throttle += 0.02;

    }else{

        p.throttle -= 0.03;

    }

    p.throttle =
        Math.max(0,Math.min(1,p.throttle));

    p.speed += car.acceleration * p.throttle;

    if(brake){

        p.speed -= 0.15;

    }

    p.speed *= 0.992;

    const maxMS = car.maxSpeed / 3.6;

    if(p.speed > maxMS){

        p.speed = maxMS;

    }

    if(isNaN(p.speed) || !isFinite(p.speed)){

        p.speed = 0;

    }

    if(left){

        p.steering += 0.02;

    }

    if(right){

        p.steering -= 0.02;

    }

    p.steering *= 0.9;

    p.heading += p.steering * p.speed * 0.01;

    p.x += Math.sin(p.heading) * p.speed * 0.05;

    p.z += Math.cos(p.heading) * p.speed * 0.05;

    const kmh = Math.round(p.speed * 3.6);

    document.getElementById("speed")
    .innerText = kmh;

    let gear = 1;

    if(kmh > 40) gear = 2;
    if(kmh > 80) gear = 3;
    if(kmh > 120) gear = 4;
    if(kmh > 180) gear = 5;
    if(kmh > 240) gear = 6;

    document.getElementById("gear")
    .innerText = "GEAR " + gear;

}

function animate(){

    requestAnimationFrame(animate);

    physics();

    if(carModel){

        const p = Game.physics;

        carModel.position.x = p.x;

        carModel.position.z = p.z;

        carModel.rotation.y = p.heading;

        camera.position.x =
            p.x - Math.sin(p.heading) * 10;

        camera.position.z =
            p.z - Math.cos(p.heading) * 10;

        camera.position.y = 5;

        camera.lookAt(
            p.x,
            1,
            p.z
        );

    }

    renderer.render(scene,camera);

}

window.addEventListener("keydown",(e)=>{

    Game.keys[e.code] = true;

});

window.addEventListener("keyup",(e)=>{

    Game.keys[e.code] = false;

});

</script>

</body>
</html>
