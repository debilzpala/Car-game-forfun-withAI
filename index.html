<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CyberCore Fixed Edition</title>

<style>
body,html{
    margin:0;
    overflow:hidden;
    background:#050b14;
    font-family:Arial;
    color:white;
}

#gameCanvas{
    width:100vw;
    height:100vh;
    display:block;
}

.menu{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    background:#08131f;
    padding:30px;
    border:2px solid cyan;
    border-radius:15px;
    width:400px;
    z-index:10;
}

button{
    width:100%;
    margin-top:10px;
    padding:15px;
    background:#00d9ff20;
    border:2px solid cyan;
    color:white;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:cyan;
    color:black;
}

.carCard{
    border:2px solid #333;
    padding:15px;
    margin-top:10px;
    cursor:pointer;
}

.carCard.active{
    border-color:orange;
}

#hud{
    position:absolute;
    top:20px;
    left:20px;
    background:#00000099;
    padding:20px;
    border-radius:10px;
    display:none;
    z-index:5;
}

#speed{
    font-size:60px;
}

#touchControls{
    position:absolute;
    bottom:20px;
    width:100%;
    display:flex;
    justify-content:space-between;
    padding:20px;
    box-sizing:border-box;
    display:none;
}

.touchGroup{
    display:flex;
    gap:10px;
}

.touchBtn{
    width:80px;
    height:80px;
    border:2px solid cyan;
    background:#00d9ff20;
    color:white;
    font-size:20px;
}
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>

<body>

<div id="menuMode" class="menu">
    <h1>TRYB GRY</h1>

    <button onclick="selectMode('singleplayer')">
        SINGLEPLAYER
    </button>

    <button onclick="selectMode('multiplayer')">
        MULTIPLAYER
    </button>
</div>

<div id="menuGarage" class="menu" style="display:none;">
    <h1>WYBIERZ AUTO</h1>

    <div id="cars"></div>

    <button onclick="startGame()">
        START
    </button>
</div>

<div id="hud">
    <div id="carName">BMW</div>
    <div id="speed">0</div>
    <div>KM/H</div>
    <div id="gear">1</div>
</div>

<div id="touchControls">
    <div class="touchGroup">
        <button class="touchBtn" id="leftBtn">◀</button>
        <button class="touchBtn" id="rightBtn">▶</button>
    </div>

    <div class="touchGroup">
        <button class="touchBtn" id="gasBtn">▲</button>
        <button class="touchBtn" id="brakeBtn">▼</button>
    </div>
</div>

<script>

const Game = {

    mode:"singleplayer",

    selectedCar:0,

    keys:{},

    touch:{
        gas:false,
        brake:false,
        left:false,
        right:false
    },

    cars:[
        {
            name:"BMW M4",
            mass:1600,
            maxSpeed:280,
            acceleration:12,
            color:0x00ffff
        },

        {
            name:"Porsche 911",
            mass:1450,
            maxSpeed:320,
            acceleration:14,
            color:0xff8800
        },

        {
            name:"Kamikaze K1",
            mass:50,
            maxSpeed:80,
            acceleration:6,
            color:0xff00ff
        }
    ],

    physics:{
        speed:0,
        throttle:0,
        steering:0,
        heading:0,
        x:0,
        z:0,
        gear:1
    }
};

function selectMode(mode){

    Game.mode = mode;

    document.getElementById("menuMode").style.display = "none";
    document.getElementById("menuGarage").style.display = "block";

    buildGarage();
}

function buildGarage(){

    const cars = document.getElementById("cars");

    cars.innerHTML = "";

    Game.cars.forEach((car,index)=>{

        const div = document.createElement("div");

        div.className = "carCard";

        if(index===0){
            div.classList.add("active");
        }

        div.innerHTML = `
            <h2>${car.name}</h2>
            <div>VMAX: ${car.maxSpeed}</div>
            <div>0-100: ${car.acceleration}s</div>
        `;

        div.onclick = ()=>{

            Game.selectedCar = index;

            document.querySelectorAll(".carCard").forEach(el=>{
                el.classList.remove("active");
            });

            div.classList.add("active");
        };

        cars.appendChild(div);
    });
}

let scene;
let camera;
let renderer;
let player;

function startGame(){

    document.getElementById("menuGarage").style.display = "none";
    document.getElementById("hud").style.display = "block";

    if(window.innerWidth < 1000){
        document.getElementById("touchControls").style.display = "flex";
    }

    init3D();

    animate();
}

function init3D(){

    scene = new THREE.Scene();

    scene.background = new THREE.Color(0x050b14);

    camera = new THREE.PerspectiveCamera(
        75,
        window.innerWidth/window.innerHeight,
        0.1,
        1000
    );

    renderer = new THREE.WebGLRenderer({
        antialias:true
    });

    renderer.setSize(window.innerWidth,window.innerHeight);

    document.body.appendChild(renderer.domElement);

    const light = new THREE.DirectionalLight(0xffffff,1);

    light.position.set(10,20,10);

    scene.add(light);

    const ambient = new THREE.AmbientLight(0x404040);

    scene.add(ambient);

    const groundGeo = new THREE.PlaneGeometry(2000,2000);

    const groundMat = new THREE.MeshStandardMaterial({
        color:0x111111
    });

    const ground = new THREE.Mesh(groundGeo,groundMat);

    ground.rotation.x = -Math.PI/2;

    scene.add(ground);

    const selected = Game.cars[Game.selectedCar];

    const carGeo = new THREE.BoxGeometry(2,1,4);

    const carMat = new THREE.MeshStandardMaterial({
        color:selected.color
    });

    player = new THREE.Mesh(carGeo,carMat);

    player.position.y = 0.5;

    scene.add(player);

    document.getElementById("carName").innerText = selected.name;

    window.addEventListener("resize",onResize);
}

function onResize(){

    camera.aspect = window.innerWidth/window.innerHeight;

    camera.updateProjectionMatrix();

    renderer.setSize(window.innerWidth,window.innerHeight);
}

function updatePhysics(){

    const car = Game.cars[Game.selectedCar];

    const p = Game.physics;

    const gas =
        Game.keys["KeyW"] ||
        Game.keys["ArrowUp"] ||
        Game.touch.gas;

    const brake =
        Game.keys["KeyS"] ||
        Game.keys["ArrowDown"] ||
        Game.touch.brake;

    const left =
        Game.keys["KeyA"] ||
        Game.keys["ArrowLeft"] ||
        Game.touch.left;

    const right =
        Game.keys["KeyD"] ||
        Game.keys["ArrowRight"] ||
        Game.touch.right;

    // throttle

    if(gas){
        p.throttle += 0.02;
    }else{
        p.throttle -= 0.03;
    }

    p.throttle = Math.max(0,Math.min(1,p.throttle));

    // acceleration

    p.speed += p.throttle * 0.15;

    // braking

    if(brake){
        p.speed -= 0.25;
    }

    // drag

    p.speed *= 0.992;

    // speed limit

    const maxMS = car.maxSpeed / 3.6;

    if(p.speed > maxMS){
        p.speed = maxMS;
    }

    if(p.speed < -10){
        p.speed = -10;
    }

    // anti NaN

    if(isNaN(p.speed) || !isFinite(p.speed)){
        p.speed = 0;
    }

    // steering

    if(left){
        p.steering += 0.02;
    }

    if(right){
        p.steering -= 0.02;
    }

    p.steering *= 0.9;

    // heading

    p.heading += p.steering * (p.speed * 0.01);

    // movement

    p.x += Math.sin(p.heading) * p.speed * 0.05;

    p.z += Math.cos(p.heading) * p.speed * 0.05;

    // gears

    const kmh = Math.abs(p.speed * 3.6);

    if(kmh < 30) p.gear = 1;
    else if(kmh < 70) p.gear = 2;
    else if(kmh < 120) p.gear = 3;
    else if(kmh < 170) p.gear = 4;
    else if(kmh < 220) p.gear = 5;
    else p.gear = 6;

    // HUD

    document.getElementById("speed").innerText =
        Math.round(kmh);

    document.getElementById("gear").innerText =
        "GEAR " + p.gear;
}

function animate(){

    requestAnimationFrame(animate);

    updatePhysics();

    const p = Game.physics;

    player.position.x = p.x;
    player.position.z = p.z;

    player.rotation.y = p.heading;

    camera.position.x =
        player.position.x - Math.sin(p.heading) * 10;

    camera.position.z =
        player.position.z - Math.cos(p.heading) * 10;

    camera.position.y = 5;

    camera.lookAt(player.position);

    renderer.render(scene,camera);
}

window.addEventListener("keydown",(e)=>{
    Game.keys[e.code] = true;
});

window.addEventListener("keyup",(e)=>{
    Game.keys[e.code] = false;
});

function bindTouch(id,key){

    const el = document.getElementById(id);

    el.addEventListener("touchstart",(e)=>{
        e.preventDefault();
        Game.touch[key] = true;
    });

    el.addEventListener("touchend",(e)=>{
        e.preventDefault();
        Game.touch[key] = false;
    });
}

bindTouch("gasBtn","gas");
bindTouch("brakeBtn","brake");
bindTouch("leftBtn","left");
bindTouch("rightBtn","right");

</script>

</body>
</html>
