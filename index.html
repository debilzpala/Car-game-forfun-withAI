<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Race Master 3D - Setup</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        #speedUI { position: absolute; top: 20px; left: 20px; color: #ff8a00; font-family: sans-serif; font-size: 24px; font-weight: bold; }
    </style>
    <script type="importmap">
        { "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }}
    </script>
</head>
<body>
    <div id="speedUI">Prędkość: 0 km/h</div>
    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // 1. Scena i Render
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 2000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // 2. Światło
        scene.add(new THREE.AmbientLight(0xffffff, 1.2));
        const sun = new THREE.DirectionalLight(0xffffff, 1.5);
        sun.position.set(50, 100, 50);
        scene.add(sun);

        // 3. Ładowanie zasobów
        let car;
        let speed = 0;
        const keys = { w: false, s: false, a: false, d: false };
        const loader = new GLTFLoader();

        // Mapa
        loader.load('./mapa1.glb', (gltf) => {
            const map = gltf.scene;
            map.scale.set(1, 1, 1); 
            scene.add(map);
        });

        // Auto
        loader.load('./bmw_m4.glb', (gltf) => {
            car = gltf.scene;
            car.scale.set(1, 1, 1); // Jeśli auto będzie za duże/małe, tutaj zmieniasz tę wartość (np. 0.5 lub 2)
            scene.add(car);
        }, undefined, () => {
            // Backup (czerwony box)
            car = new THREE.Mesh(new THREE.BoxGeometry(2, 1, 4), new THREE.MeshStandardMaterial({color: 0xff0000}));
            scene.add(car);
        });

        // 4. Sterowanie
        window.onkeydown = (e) => keys[e.key.toLowerCase()] = true;
        window.onkeyup = (e) => keys[e.key.toLowerCase()] = false;

        // 5. Pętla animacji
        function animate() {
            requestAnimationFrame(animate);
            if (car) {
                if (keys.w) speed = 0.1;
                else if (keys.s) speed = -0.05;
                else speed *= 0.95;

                if (keys.a) car.rotation.y += 0.06;
                if (keys.d) car.rotation.y -= 0.06;

                car.position.x += Math.sin(car.rotation.y) * speed;
                car.position.z += Math.cos(car.rotation.y) * speed;

                document.getElementById('speedUI').innerText = "Prędkość: " + Math.round(Math.abs(speed) * 200) + " km/h";

                // Kamera podąża za autem
                const offset = new THREE.Vector3(0, 5, 10);
                offset.applyAxisAngle(new THREE.Vector3(0, 1, 0), car.rotation.y);
                camera.position.lerp(car.position.clone().add(offset), 0.1);
                camera.lookAt(car.position);
            }
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
