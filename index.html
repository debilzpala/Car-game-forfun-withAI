<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>RACE MASTER 3D</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; }
        #menu { position: absolute; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: #000; z-index: 10; }
        .hidden { display: none !important; }
        button { padding: 15px 30px; margin: 10px; cursor: pointer; }
        #ui { position: absolute; top: 20px; left: 20px; pointer-events: none; color: #0f0; }
        #peer-info { margin: 15px; padding: 10px; background: #333; border: 1px solid #fff; }
    </style>
</head>
<body>

<div id="menu">
    <h1>RACE MASTER 3D</h1>
    <button onclick="show('mode-select')">START</button>
    <div id="mode-select" class="hidden">
        <button onclick="initGame(false)">SINGLE PLAYER</button>
        <button onclick="show('p2p-menu')">MULTIPLAYER</button>
    </div>
    <div id="p2p-menu" class="hidden">
        <button id="create-lobby">STWÓRZ LOBBY</button>
        <div id="peer-info">Kliknij by utworzyć ID</div>
        <input id="peer-id" placeholder="Wklej ID hosta tutaj">
        <button onclick="joinGame()">DOŁĄCZ</button>
    </div>
    <div id="car-select" class="hidden">
        <button onclick="selectCar('bmw_m5.glb', 270, 0.00004)">BMW M5</button>
        <button onclick="selectCar('porshe.glb', 330, 0.00009)">PORSHE</button>
    </div>
</div>

<div id="ui" class="hidden"><div id="hud">Prędkość: 0 km/h</div></div>

<script type="importmap">{ "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }</script>

<script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { DRACOLoader } from 'three/addons/loaders/DRACOLoader.js';

    let s = new THREE.Scene(), c = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.01, 1000), r = new THREE.WebGLRenderer({antialias: true});
    document.body.appendChild(r.domElement); r.setSize(innerWidth, innerHeight);
    s.add(new THREE.AmbientLight(0xffffff, 2));

    let car, peer = new Peer(), conn, carData, vel = 0, k = {};
    let currentSteer = 0; // Płynne sterowanie
    let remoteCar;

    const loader = new GLTFLoader().setDRACOLoader(new DRACOLoader().setDecoderPath('https://www.gstatic.com/draco/v1/decoders/'));

    window.show = (id) => { document.querySelectorAll('#menu > div').forEach(d => d.classList.add('hidden')); document.getElementById(id).classList.remove('hidden'); };
    window.initGame = (multi) => { show('car-select'); };

    document.getElementById('create-lobby').onclick = () => {
        document.getElementById('peer-info').innerText = "ID: " + peer.id;
    };

    window.joinGame = () => {
        conn = peer.connect(document.getElementById('peer-id').value);
        setupConn();
        initGame(true);
    };

    peer.on('connection', (c) => { conn = c; setupConn(); });

    function setupConn() {
        conn.on('data', (d) => {
            if(!remoteCar) loader.load('bmw_m5.glb', (g) => { remoteCar = g.scene; remoteCar.scale.set(0.05, 0.05, 0.05); s.add(remoteCar); });
            if(remoteCar) { remoteCar.position.set(d.p.x, d.p.y, d.p.z); remoteCar.rotation.y = d.r; }
        });
    }

    window.selectCar = (model, max, acc) => {
        carData = {max, acc};
        document.getElementById('menu').classList.add('hidden');
        document.getElementById('ui').classList.remove('hidden');
        loader.load(model, (g) => { car = g.scene; car.scale.set(0.05, 0.05, 0.05); car.position.y = 0.1; s.add(car); });
        loader.load('mapa1.glb', (g) => { g.scene.scale.set(10, 10, 10); s.add(g.scene); });
        animate();
    };

    window.onkeydown = (e) => k[e.key.toLowerCase()] = true;
    window.onkeyup = (e) => k[e.key.toLowerCase()] = false;

    function animate() {
        requestAnimationFrame(animate);
        if(car) {
            if(k['w']) vel = Math.min(vel + carData.acc, carData.max / 5000);
            else vel *= 0.99;
            
            // Płynne sterowanie (lerp)
            let targetSteer = (k['a'] ? 0.04 : 0) - (k['d'] ? 0.04 : 0);
            currentSteer += (targetSteer - currentSteer) * 0.1;
            car.rotation.y += currentSteer * (vel * 20);
            
            car.position.x += Math.sin(car.rotation.y) * vel;
            car.position.z += Math.cos(car.rotation.y) * vel;

            if(conn && conn.open) conn.send({p: car.position, r: car.rotation.y});
            
            let camOffset = new THREE.Vector3(0, 0.3, -0.5).applyAxisAngle(new THREE.Vector3(0,1,0), car.rotation.y);
            c.position.copy(car.position).add(camOffset);
            c.lookAt(car.position.clone().add(new THREE.Vector3(0, 0, 0.05).applyAxisAngle(new THREE.Vector3(0,1,0), car.rotation.y)));
            
            document.getElementById('hud').innerText = `Prędkość: ${Math.floor(vel * 5000)} km/h`;
        }
        r.render(s, c);
    }
</script>
</body>
</html>
