<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gra 3D - Racing Master P2P</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { overflow: hidden; background: #111; height: 100vh; display: flex; justify-content: center; align-items: center; color: white; }
        #gameContainer { position: relative; width: 100%; height: 100%; }
        #canvasContainer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; }
        canvas { display: block; }
        .menu { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: rgba(0, 0, 0, 0.9); z-index: 100; text-align: center; }
        .menu h1 { font-size: 3rem; margin-bottom: 20px; color: #ff8a00; text-transform: uppercase; }
        .menu button { background: linear-gradient(45deg, #ff8a00, #e52e71); border: none; padding: 15px 40px; margin: 10px; font-size: 1.2rem; color: white; border-radius: 25px; cursor: pointer; width: 280px; font-weight: bold; }
        .menu input { padding: 12px; width: 280px; margin: 10px; font-size: 1.1rem; border: 2px solid #ff8a00; border-radius: 25px; background: #000; color: #fff; text-align: center; }
        .backButton { background: #333 !important; }
        .carSelector { display: flex; gap: 20px; margin: 20px; }
        .carOption { padding: 20px; background: #222; border-radius: 10px; cursor: pointer; border: 2px solid transparent; width: 180px; }
        .carOption.selected { border-color: #e52e71; background: #331122; }
        #loadingScreen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 200; display: none; }
        .loader { width: 60px; height: 60px; border: 6px solid #333; border-top: 6px solid #ff8a00; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #ui { position: absolute; top: 20px; left: 20px; color: white; font-size: 18px; font-weight: bold; background: rgba(0,0,0,0.6); padding: 15px; border-radius: 8px; z-index: 10; line-height: 1.5; }
        #instrukcja { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.7); padding: 10px 20px; border-radius: 8px; text-align: center; font-size: 14px; z-index: 10; }
        .highlight { color: #ff8a00; }
        #playerList { position: absolute; top: 20px; right: 20px; background: rgba(0,0,0,0.7); padding: 15px; border-radius: 8px; z-index: 10; min-width: 150px; }
    </style>
</head>
<body>
    <div id="mainMenu" class="menu">
        <h1>Race Master 3D</h1>
        <button id="singlePlayerBtn">Graj Solo</button>
        <button id="multiplayerBtn">Graj z Przyjacielem</button>
    </div>
    
    <div id="multiplayerMenu" class="menu" style="display: none;">
        <h2>Multiplayer P2P</h2>
        <button id="hostBtn">Stwórz Pokój (Host)</button>
        <button id="joinBtn">Dołącz do Pokoju</button>
        <button class="backButton" id="backToMainBtn">Powrót</button>
    </div>
    
    <div id="hostRoom" class="menu" style="display: none;">
        <h2>Twój Pokój</h2>
        <p>Wyślij ten kod koledze:</p>
        <input type="text" id="roomIdDisplay" readonly>
        <button id="startHostGameBtn">Wybór pojazdu</button>
        <button class="backButton" id="backToMultiBtn">Powrót</button>
    </div>
    
    <div id="joinRoom" class="menu" style="display: none;">
        <h2>Dołącz do gry</h2>
        <input type="text" id="roomIdInput" placeholder="Wklej ID od Hosta">
        <button id="joinRoomBtn">Połącz</button>
        <button class="backButton" id="backToMulti2Btn">Powrót</button>
    </div>
    
    <div id="carSelection" class="menu" style="display: none;">
        <h2>Wybierz Pojazd</h2>
        <div class="carSelector">
            <div class="carOption" data-car="bmw_m5">
                <div style="font-weight:bold;">BMW M4</div>
                <div style="font-size:12px; color:#aaa; margin-top:5px;">bmw_m4.glb</div>
            </div>
            <div class="carOption" data-car="porsche_911">
                <div style="font-weight:bold;">Porsche</div>
                <div style="font-size:12px; color:#aaa; margin-top:5px;">porsche.glb</div>
            </div>
        </div>
        <button id="confirmCarBtn">Zatwierdź i Uruchom Świat</button>
    </div>
    
    <div id="loadingScreen">
        <div class="loader"></div>
        <div id="loadingText">Generowanie terenu proceduralnego...</div>
    </div>
    
    <div id="gameContainer">
        <div id="canvasContainer"></div>
        <div id="ui">
            Kamera: <span id="camMode" class="highlight">TPP</span><br>
            Bieg: <span id="gear" class="highlight">1</span><br>
            RPM: <span id="rpm">1000</span> / 7500<br>
            Prędkość: <span id="speed">0</span> km/h
        </div>
        <div id="instrukcja">Sterowanie: <b>WASD / Strzałki</b> | Zmiana kamery: <b>Klawisz C</b></div>
        <div id="playerList"><div>Gracze:</div></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <script>
        let gameState = 'menu', selectedCar = 'bmw_m5', isHost = false;
        let peer = null, connections = [], remotePlayers = {}, pendingRemotes = [];
        let scene, camera, renderer, car;
        let gltfLoader;
        
        let lastNetworkUpdate = 0;
        const networkTickInterval = 40; // 25 ticków sieciowych na sekundę

        // Fizyka jazdy
        let currentSpeed = 0;
        const maxSpeed = 1.8, acceleration = 0.015, friction = 0.008, turnSpeed = 0.04;
        const keys = { forward: false, backward: false, left: false, right: false };
        let cameraViewMode = 'TPP';

        const carConfigs = { 'bmw_m5': { path: 'bmw_m4.glb' }, 'porsche_911': { path: 'porsche.glb' } };

        // DOM
        const mainMenu = document.getElementById('mainMenu');
        const multiplayerMenu = document.getElementById('multiplayerMenu');
        const hostRoom = document.getElementById('hostRoom');
        const joinRoom = document.getElementById('joinRoom');
        const carSelection = document.getElementById('carSelection');
        const loadingScreen = document.getElementById('loadingScreen');
        const canvasContainer = document.getElementById('canvasContainer');
        const roomIdDisplay = document.getElementById('roomIdDisplay');
        const roomIdInput = document.getElementById('roomIdInput');

        // Input handler
        window.addEventListener('keydown', (e) => {
            if (gameState !== 'game') return;
            if (e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W') keys.forward = true;
            if (e.key === 'ArrowDown' || e.key === 's' || e.key === 'S') keys.backward = true;
            if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') keys.left = true;
            if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') keys.right = true;
            if (e.key === 'c' || e.key === 'C') {
                cameraViewMode = cameraViewMode === 'TPP' ? 'FPP' : 'TPP';
                document.getElementById('camMode').textContent = cameraViewMode;
            }
        });
        window.addEventListener('keyup', (e) => {
            if (e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W') keys.forward = false;
            if (e.key === 'ArrowDown' || e.key === 's' || e.key === 'S') keys.backward = false;
            if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') keys.left = false;
            if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') keys.right = false;
        });

        // Nawigacja menu
        document.getElementById('singlePlayerBtn').addEventListener('click', () => { gameState = 'carSelect'; isHost = true; mainMenu.style.display = 'none'; carSelection.style.display = 'flex'; });
        document.getElementById('multiplayerBtn').addEventListener('click', () => { mainMenu.style.display = 'none'; multiplayerMenu.style.display = 'flex'; });
        document.getElementById('hostBtn').addEventListener('click', () => { isHost = true; multiplayerMenu.style.display = 'none'; hostRoom.style.display = 'flex'; initPeer(true); });
        document.getElementById('joinBtn').addEventListener('click', () => { multiplayerMenu.style.display = 'none'; joinRoom.style.display = 'flex'; });
        document.getElementById('startHostGameBtn').addEventListener('click', () => { hostRoom.style.display = 'none'; carSelection.style.display = 'flex'; });
        document.getElementById('joinRoomBtn').addEventListener('click', () => {
            const val = roomIdInput.value.trim();
            if(val) { isHost = false; joinRoom.style.display = 'none'; carSelection.style.display = 'flex'; initPeer(false, val); }
        });
        document.getElementById('backToMainBtn').addEventListener('click', () => { multiplayerMenu.style.display = 'none'; mainMenu.style.display = 'flex'; });
        document.getElementById('backToMultiBtn').addEventListener('click', () => { hostRoom.style.display = 'none'; multiplayerMenu.style.display = 'flex'; });
        document.getElementById('backToMulti2Btn').addEventListener('click', () => { joinRoom.style.display = 'none'; multiplayerMenu.style.display = 'flex'; });

        document.querySelectorAll('.carOption').forEach(opt => {
            opt.addEventListener('click', () => {
                document.querySelectorAll('.carOption').forEach(o => o.classList.remove('selected'));
                opt.classList.add('selected'); selectedCar = opt.dataset.car;
            });
        });

        document.getElementById('confirmCarBtn').addEventListener('click', () => {
            carSelection.style.display = 'none'; loadingScreen.style.display = 'flex';
            if(!isHost) {
                broadcast({ type: 'init_car', carType: selectedCar });
            } else {
                broadcast({ type: 'start_game' });
                setTimeout(launchGame, 400);
            }
        });

        // PEERJS NETWORK
        function initPeer(hostMode, targetId = null) {
            peer = new Peer();
            peer.on('open', (id) => { if(hostMode) { roomIdDisplay.value = id; updateNetUI(); } else { const conn = peer.connect(targetId); handleConn(conn); } });
            peer.on('connection', (conn) => { handleConn(conn); });
        }

        function handleConn(conn) {
            connections.push(conn);
            conn.on('open', () => { updateNetUI(); });
            conn.on('data', (data) => {
                if(data.type === 'start_game') { launchGame(); }
                if(data.type === 'init_car') {
                    if(!scene) pendingRemotes.push({ id: conn.peer, type: data.carType });
                    else spawnRemoteCar(conn.peer, data.carType);
                }
                if(data.type === 'pos_update') {
                    if(remotePlayers[conn.peer]) {
                        remotePlayers[conn.peer].position.set(data.p.x, data.p.y, data.p.z);
                        remotePlayers[conn.peer].rotation.set(data.r.x, data.r.y, data.r.z);
                    }
                }
            });
        }

        function broadcast(msg) { connections.forEach(c => { if(c.open) c.send(msg); }); }
        function updateNetUI() {
            const list = document.getElementById('playerList');
            list.innerHTML = `<div>Gracze:</div><div style="color:#ff8a00;">Ty (${isHost?'Host':'Klient'})</div>`;
            connections.forEach((c, i) => { list.innerHTML += `<div>Gracz ${i+2}</div>`; });
        }

        // Awaryjny model pojazdu (gdyby lokalny .glb nie był podpięty)
        function generateFallbackCar(colorHex) {
            const carGroup = new THREE.Group();
            const body = new THREE.Mesh(new THREE.BoxGeometry(1.6, 0.6, 3.2), new THREE.MeshStandardMaterial({ color: colorHex, roughness: 0.2 }));
            body.position.y = 0.4; carGroup.add(body);
            const cabin = new THREE.Mesh(new THREE.BoxGeometry(1.3, 0.5, 1.6), new THREE.MeshStandardMaterial({ color: 0x222222 }));
            cabin.position.set(0, 0.85, -0.2); carGroup.add(cabin);
            const wheelGeo = new THREE.CylinderGeometry(0.35, 0.35, 0.3, 12);
            const wheelMat = new THREE.MeshStandardMaterial({ color: 0x111111 });
            [[-0.85, 0.35, 1], [0.85, 0.35, 1], [-0.85, 0.35, -1], [0.85, 0.35, -1]].forEach(p => {
                const w = new THREE.Mesh(wheelGeo, wheelMat); w.rotation.z = Math.PI / 2; w.position.set(p[0], p[1], p[2]); carGroup.add(w);
            });
            return carGroup;
        }

        function spawnRemoteCar(id, type) {
            if (remotePlayers[id]) return;
            gltfLoader.load(carConfigs[type].path, 
                (gltf) => { const mesh = gltf.scene; mesh.scale.set(0.5,0.5,0.5); scene.add(mesh); remotePlayers[id] = mesh; },
                undefined,
                () => { const mesh = generateFallbackCar(0x00ff00); scene.add(mesh); remotePlayers[id] = mesh; }
            );
        }

        // --- PROCEDURALNY GENERATOR ŚWIATA 3D ---
        function generateProceduralWorld() {
            // 1. Podłoże terenu (Góry/Wzgórza z matematycznego szumu sinusów)
            const terrainGeo = new THREE.PlaneGeometry(1000, 1000, 120, 120);
            terrainGeo.rotateX(-Math.PI / 2);
            
            const pos = terrainGeo.attributes.position;
            for (let i = 0; i < pos.count; i++) {
                const x = pos.getX(i);
                const z = pos.getZ(i);
                
                // Matematyczne nakładanie fal udających naturalne ukształtowanie terenu
                let y = Math.sin(x * 0.02) * Math.cos(z * 0.02) * 12;
                y += Math.sin(x * 0.05) * 3; // Mniejsze pagórki
                
                // Tworzymy płaski płaskowyż na środku świata (wokół punktu startowego 0,0), żeby auto nie startowało w powietrzu
                const distFromCenter = Math.sqrt(x*x + z*z);
                if (distFromCenter < 60) {
                    y = THREE.MathUtils.lerp(0, y, (distFromCenter / 60));
                }
                
                pos.setY(i, y);
            }
            terrainGeo.computeVertexNormals();
            
            // Kolorowanie terenu (Stylizowana zieleń)
            const terrainMat = new THREE.MeshStandardMaterial({ color: 0x2e5c1e, roughness: 0.9, metalness: 0.1, flatShading: true });
            const terrain = new THREE.Mesh(terrainGeo, terrainMat);
            scene.add(terrain);

            // 2. Proceduralna, nieskończona prosta droga do testowania prędkości
            const roadGeo = new THREE.PlaneGeometry(12, 2000);
            roadGeo.rotateX(-Math.PI / 2);
            const roadMat = new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.6 });
            const road = new THREE.Mesh(roadGeo, roadMat);
            road.position.set(0, 0.02, 0); // Lekko nad ziemią, by uniknąć migania tekstur (Z-fighting)
            scene.add(road);

            // Paski na drodze
            const lineGeo = new THREE.PlaneGeometry(0.3, 2000);
            lineGeo.rotateX(-Math.PI / 2);
            const lineMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
            const centerLine = new THREE.Mesh(lineGeo, lineMat);
            centerLine.position.set(0, 0.03, 0);
            scene.add(centerLine);
        }

        // START SILNIKA 3D
        function launchGame() {
            gameState = 'game'; loadingScreen.style.display = 'none'; canvasContainer.style.display = 'block';
            
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xb3e5fc);
            scene.fog = new THREE.FogExp2(0xb3e5fc, 0.002);
            
            camera = new THREE.PerspectiveCamera(65, window.innerWidth / window.innerHeight, 0.1, 2000);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); // Optymalizacja pod ekrany 4K
            canvasContainer.appendChild(renderer.domElement);
            
            // Oświetlenie świata
            scene.add(new THREE.AmbientLight(0xffffff, 0.7));
            const sunLight = new THREE.DirectionalLight(0xffffff, 0.8);
            sunLight.position.set(100, 200, 50);
            scene.add(sunLight);

            // GENERUJEMY NOWY ŚWIAT Z KODU
            generateProceduralWorld();

            gltfLoader = new THREE.GLTFLoader();

            // Ładowanie Auta gracza
            gltfLoader.load(carConfigs[selectedCar].path,
                (gltf) => { car = gltf.scene; car.scale.set(0.5, 0.5, 0.5); scene.add(car); completeInitialization(); },
                undefined,
                () => { car = generateFallbackCar(0xff4444); scene.add(car); completeInitialization(); }
            );

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        }

        function completeInitialization() {
            broadcast({ type: 'init_car', carType: selectedCar });
            pendingRemotes.forEach(p => spawnRemoteCar(p.id, p.type));
            pendingRemotes = [];
            animate(0);
        }

        function animate(currentTime) {
            requestAnimationFrame(animate);
            
            if (car) {
                // Fizyka przyspieszania i hamowania
                if (keys.forward) currentSpeed = THREE.MathUtils.lerp(currentSpeed, maxSpeed, acceleration);
                else if (keys.backward) currentSpeed = THREE.MathUtils.lerp(currentSpeed, -maxSpeed/2, acceleration*1.5);
                else currentSpeed = THREE.MathUtils.lerp(currentSpeed, 0, friction);

                // Skręcanie pojazdu
                if (Math.abs(currentSpeed) > 0.01) {
                    const directionModifier = currentSpeed > 0 ? 1 : -1;
                    if (keys.left) car.rotation.y += turnSpeed * directionModifier;
                    if (keys.right) car.rotation.y -= turnSpeed * directionModifier;
                }

                // Aktualizacja pozycji
                car.position.x += Math.sin(car.rotation.y) * currentSpeed;
                car.position.z += Math.cos(car.rotation.y) * currentSpeed;

                // Liczniki w UI na ekranie
                let speedKmh = Math.round(Math.abs(currentSpeed) * 140);
                document.getElementById('speed').textContent = speedKmh;
                document.getElementById('rpm').textContent = 1000 + Math.round(speedKmh * 35);
                document.getElementById('gear').textContent = currentSpeed < -0.05 ? "R" : Math.max(1, Math.min(6, Math.floor(speedKmh/35)+1));

                // Kamera
                if (cameraViewMode === 'TPP') {
                    camera.position.set(car.position.x - Math.sin(car.rotation.y) * 8, car.position.y + 3.0, car.position.z - Math.cos(car.rotation.y) * 8);
                    camera.lookAt(car.position.x, car.position.y + 0.6, car.position.z);
                } else {
                    camera.position.set(car.position.x, car.position.y + 1.2, car.position.z);
                    camera.lookAt(car.position.x + Math.sin(car.rotation.y) * 10, car.position.y + 1.0, car.position.z + Math.cos(car.rotation.y) * 10);
                }

                // Ograniczenie wysyłania pakietów sieciowych (Tickrate), by nie zapchać przeglądarki
                if (currentTime - lastNetworkUpdate > networkTickInterval) {
                    broadcast({ type: 'pos_update', p: car.position, r: car.rotation });
                    lastNetworkUpdate = currentTime;
                }
            }

            if (renderer && scene && camera) {
                renderer.render(scene, camera);
            }
        }

        document.querySelector('.carOption[data-car="bmw_m5"]').classList.add('selected');
    </script>
</body>
</html>
